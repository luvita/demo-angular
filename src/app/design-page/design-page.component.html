<div class="d-flex">
  <div class="example-container mat-elevation-z8 mt-10">
    <table mat-table [dataSource]="dataSource">

      <!-- Position Column -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef style="width:35%"> No. </th>
        <td mat-cell *matCellDef="let element"> {{element.position}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="weight">
        <th mat-header-cell *matHeaderCellDef> Weight </th>
        <td mat-cell *matCellDef="let element"> {{element.weight}} </td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="symbol">
        <th mat-header-cell *matHeaderCellDef> Symbol </th>
        <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
      </ng-container>

      <ng-container matColumnDef="symbol1">
        <th mat-header-cell *matHeaderCellDef> Symbol1</th>
        <td mat-cell *matCellDef="let element"> {{element.symbol1}} </td>
      </ng-container>


      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <div class="page w-80-percent h-500 m-10" [class.no-event]="designPageService.showShadow"
    (dragover)="dragOver($event)" (dragenter)="dragEnter($event)" (dragleave)="dragLeave($event)" (drop)="drop($event)"
    (mousemove)="mouseMove($event)" (mouseup)="mouseUp($event)" #page>
    <div class="item" [class.active]="item.active" *ngFor="let item of designPageService.items"
      [style.left.px]="item.position.x" [style.top.px]="item.position.y" [ngStyle]="item.style" [ngClass]="item.class">
      <div class="item-container" (mousedown)="mouseDown($event, item)">
        <div class="item-content" id="item-{{ item.id }}" [innerHTML]="createElement(item.element) | safe: 'html'">
        </div>
      </div>
      <div class="item-resize item-resize-top" (mousedown)="resizeTop($event, item)"></div>
      <div class="item-resize item-resize-top-right" (mousedown)="resizeTopRight($event, item)"></div>
      <div class="item-resize item-resize-right" (mousedown)="resizeRight($event, item)"></div>
      <div class="item-resize item-resize-bottom-right" (mousedown)="resizeBottomRight($event, item)"></div>
      <div class="item-resize item-resize-bottom" (mousedown)="resizeBottom($event, item)"></div>
      <div class="item-resize item-resize-bottom-left" (mousedown)="resizeBottomLeft($event, item)"></div>
      <div class="item-resize item-resize-left" (mousedown)="resizeLeft($event, item)"></div>
      <div class="item-resize item-resize-top-left" (mousedown)="resizeTopLeft($event, item)"></div>
    </div>
    <div class="item item-drag-placeholder" *ngIf="designPageService.itemSelect && designPageService.showShadow"
      [style.left.px]="designPageService.positionSelect.x" [style.top.px]="designPageService.positionSelect.y"
      [ngStyle]="designPageService.itemSelect.style">
      <div class="item-content">{{designPageService.itemSelect.name}}</div>
    </div>

  </div>
</div>
<div class="d-flex">
  <div class="bottom-item-b">
  </div>
  <div class="bottom-item w-80-percent m-2">
    <div class="list-item" *ngFor="let item of itemDrags" draggable="true" (dragstart)="dragStart($event, item)"
      (dragend)="dragEnd($event)">
      <i [ngClass]="'fa ' + item.icon"></i>
      {{item.name}}
    </div>
  </div>
</div>
