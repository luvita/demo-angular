  <design-page class="w-100-percent" [(items)]="items" [itemDrags]="itemDrags">
    <ng-template let-item>
      <ng-container [ngSwitch]="item.type">
        <div *ngSwitchCase="'input'">
          <input type="text"/>
        </div>
        <div *ngSwitchDefault>
          {{ item.name }}
        </div>
      </ng-container>
    </ng-template>
  </design-page>

  <pre class="output w-30-percent h-500 m-10" [innerHTML]="syntaxHighlight(items)"></pre>
</div>
